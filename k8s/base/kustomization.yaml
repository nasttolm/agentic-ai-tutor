  - fsd/deployment.yaml
  - fsd/service.yaml
  - fsd/chroma-deployment.yaml
  - fsd/chroma-service.yaml
  - fcs/deployment.yaml
  - fcs/service.yaml
  - fcs/chroma-deployment.yaml
  - fcs/chroma-service.yaml
