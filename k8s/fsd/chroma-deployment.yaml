apiVersion: apps/v1
kind: Deployment
metadata:
  name: fsd-chroma
  namespace: ai-tutor
  labels:
    app: fsd-chroma
    subject: fsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fsd-chroma
  template:
    metadata:
      labels:
        app: fsd-chroma
        subject: fsd
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: fsd-chroma-pvc
