apiVersion: apps/v1
kind: Deployment
metadata:
  name: fsd-service
  namespace: ai-tutor
  labels:
    app: ai-tutor
    subject: fsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-tutor
      subject: fsd
  template:
    metadata:
      labels:
        app: ai-tutor
        subject: fsd
    spec:
      containers:
        - name: fsd-service
          image: ghcr.io/your-username/ai-tutor-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: SUBJECT
              value: "fsd"
            - name: DATA_DIR
              value: "/data"
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
              nvidia.com/gpu: "1"
            limits:
              memory: "12Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: data-volume
              mountPath: /data
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: ai-tutor-data-pvc
      # GPU node selector
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
