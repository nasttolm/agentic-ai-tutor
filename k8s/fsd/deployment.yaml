apiVersion: apps/v1
kind: Deployment
metadata:
  name: fsd-service
  namespace: ai-tutor
  labels:
    app: ai-tutor
    subject: fsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-tutor
      subject: fsd
  template:
    metadata:
      labels:
        app: ai-tutor
        subject: fsd
    spec:
      containers:
        - name: fsd-service
          image: ghcr.io/nasttolm/ai-tutor-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: SUBJECT
              value: "fsd"
            - name: CHROMA_HOST
              value: "fsd-chroma"
            - name: CHROMA_PORT
              value: "8000"
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
            limits:
              memory: "12Gi"
              cpu: "4"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 600
            periodSeconds: 30
