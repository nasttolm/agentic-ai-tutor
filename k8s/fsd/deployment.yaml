apiVersion: apps/v1
kind: Deployment
metadata:
  name: fsd-service
  namespace: ai-tutor
  labels:
    app: ai-tutor
    subject: fsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-tutor
      subject: fsd
  template:
    metadata:
      labels:
        app: ai-tutor
        subject: fsd
    spec:
      containers:
        - name: fsd-service
          image: ghcr.io/your-username/ai-tutor-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: SUBJECT
              value: "fsd"
            - name: CHROMA_HOST
              value: "fsd-chroma"
            - name: CHROMA_PORT
              value: "8000"
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
              nvidia.com/gpu: "1"
            limits:
              memory: "12Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
