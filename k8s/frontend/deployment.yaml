apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-tutor
  labels:
    app: ai-tutor
    component: frontend
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-tutor
      component: frontend
  template:
    metadata:
      labels:
        app: ai-tutor
        component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/nasttolm/ai-tutor-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # In Kubernetes, frontend calls services by their DNS names
            - name: NEXT_PUBLIC_FSD_API_URL
              value: "http://fsd-service.ai-tutor.svc.cluster.local"
            - name: NEXT_PUBLIC_FCS_API_URL
              value: "http://fcs-service.ai-tutor.svc.cluster.local"
            - name: NEXT_PUBLIC_DMA_API_URL
              value: "http://dma-service.ai-tutor.svc.cluster.local"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
