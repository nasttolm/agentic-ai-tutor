apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-tutor-ingress
  namespace: ai-tutor
  labels:
    app: ai-tutor
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
    - host: ai-tutor.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api/fsd
            pathType: Prefix
            backend:
              service:
                name: fsd-service
                port:
                  number: 80
          - path: /api/fcs
            pathType: Prefix
            backend:
              service:
                name: fcs-service
                port:
                  number: 80
          - path: /api/dma
            pathType: Prefix
            backend:
              service:
                name: dma-service
                port:
                  number: 80
