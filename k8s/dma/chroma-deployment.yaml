apiVersion: apps/v1
kind: Deployment
metadata:
  name: dma-chroma
  namespace: ai-tutor
  labels:
    app: dma-chroma
    subject: dma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dma-chroma
  template:
    metadata:
      labels:
        app: dma-chroma
        subject: dma
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: dma-chroma-pvc
