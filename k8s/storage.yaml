apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-tutor-data-pvc
  namespace: ai-tutor
  labels:
    app: ai-tutor
spec:
  accessModes:
    - ReadOnlyMany  # Multiple pods can read
  storageClassName: gp2  # AWS EBS (change for other providers)
  resources:
    requests:
      storage: 50Gi  # LoRA adapters + RAG indices
---
