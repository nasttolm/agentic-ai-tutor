# Root kustomization kept as AWS-compatible default for GitOps/Argo CD.
# Usage:
# - AWS/default: kubectl apply -k k8s/
# - Local:       kubectl apply -k k8s/overlays/local

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - overlays/aws

# Image customization used by CI gitops-update job.
images:
  - name: ghcr.io/nasttolm/ai-tutor-backend
    newTag: 117baa7027a9fc21df33cbcb629ed03e4953fd27
  - name: ghcr.io/nasttolm/ai-tutor-frontend
    newTag: 117baa7027a9fc21df33cbcb629ed03e4953fd27
