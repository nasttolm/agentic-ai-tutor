# Kustomization file for AI Tutor Kubernetes deployment
# Usage: kubectl apply -k k8s/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-tutor

resources:
  - namespace.yaml
  - storage.yaml
  # Backend services
  - fsd/deployment.yaml
  - fsd/service.yaml
  - fsd/chroma-deployment.yaml
  - fsd/chroma-service.yaml
  - fcs/deployment.yaml
  - fcs/service.yaml
  - fcs/chroma-deployment.yaml
  - fcs/chroma-service.yaml
  - dma/deployment.yaml
  - dma/service.yaml
  - dma/chroma-deployment.yaml
  - dma/chroma-service.yaml
  # Frontend
  - frontend/deployment.yaml
  - frontend/service.yaml
  # Ingress
  - ingress.yaml

labels:
  - pairs:
      app: ai-tutor
      managed-by: kustomize

# Image customization (override in overlays)
images:
  - name: ghcr.io/nasttolm/ai-tutor-backend
    newTag: 9b2d82d870c255bad468ef874b9e01750a0c0465
  - name: ghcr.io/nasttolm/ai-tutor-frontend
    newTag: 9b2d82d870c255bad468ef874b9e01750a0c0465
