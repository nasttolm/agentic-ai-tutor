name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: nasttolm/ai-tutor-backend
  FRONTEND_IMAGE_NAME: nasttolm/ai-tutor-frontend

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python -m py_compile backend/src/config.py
          python -m py_compile backend/src/rag.py
          python -m py_compile backend/src/inference.py
          python -m py_compile backend/src/main.py
          python -m py_compile backend/src/schemas.py
          python -m py_compile backend/src/logging_config.py

      - name: Bandit security scan
        run: |
          pip install bandit
          bandit -r backend/src/ -ll -q || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci --prefer-offline 2>/dev/null || npm install
          npm audit --audit-level=high

      - name: Validate k8s manifests (dry-run)
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          kubectl kustomize k8s > /tmp/k8s-rendered.yaml
          ./kubeconform -strict -summary \
            /tmp/k8s-rendered.yaml

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  playwright:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  build-frontend:
    name: Build and push frontend image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  gitops-update:
    name: Update GitOps image tag
    runs-on: ubuntu-latest
    needs: [build, build-frontend]
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update backend/frontend image tags in kustomization
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("k8s/kustomization.yaml")
          text = path.read_text(encoding="utf-8")
          sha = os.environ["GITHUB_SHA"]

          pattern_backend = r"(name:\s*ghcr\.io/nasttolm/ai-tutor-backend\s*\n\s*newTag:\s*)([^\n]+)"
          updated, count_backend = re.subn(pattern_backend, rf"\g<1>{sha}", text, count=1)
          if count_backend != 1:
              raise SystemExit("Failed to find backend image tag in k8s/kustomization.yaml")

          pattern_frontend = r"(name:\s*ghcr\.io/nasttolm/ai-tutor-frontend\s*\n\s*newTag:\s*)([^\n]+)"
          updated, count_frontend = re.subn(pattern_frontend, rf"\g<1>{sha}", updated, count=1)
          if count_frontend != 1:
              raise SystemExit("Failed to find frontend image tag in k8s/kustomization.yaml")

          path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit and push updated tag
        run: |
          if git diff --quiet -- k8s/kustomization.yaml; then
            echo "No tag change detected, skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "ci(gitops): update backend/frontend image tags to ${GITHUB_SHA} [skip ci]"
          git push
